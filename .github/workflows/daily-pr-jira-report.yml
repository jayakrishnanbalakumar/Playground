name: PMO PR-Jira Report

on:
  workflow_dispatch:
    inputs:
      pr_base_branch: 
        description: "Branch for which report to be generated (optional for manual runs,uses repo default branch)"
        required: false
        type: string 
      from_date:
        description: "Start date (UTC, YYYY-MM-DD), Default is start of year"
        required: false
        type: string
      to_date:
        description: "End date (UTC, YYYY-MM-DD),  Default is today"
        required: false
        type: string

permissions:
  pull-requests: read
  
jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
       
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install report dependencies
        run: python -m pip install openpyxl

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          #JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
          JIRA_BASE_URL: "https://jira.mdsol.com/"
          PR_BASE_BRANCH: ${{ github.event.inputs.pr_base_branch ||  github.event.repository.default_branch }}
          FROM_DATE: ${{ github.event.inputs.from_date }}
          TO_DATE: ${{ github.event.inputs.to_date }}          
        run: python .github/scripts/pr_jira_report.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-jira-report
          path: reports/pr-jira-report.csv
          if-no-files-found: error
